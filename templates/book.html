<!doctype html>
<html>
<head>
    <title>Book Room</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Book Room</h1>
        <form method="post">
            Name: <input type="text" name="name" required><br>
            Phone no: <input type="text" Phone no="Phone no" required><br>
            Days Staying: <input type="number" name="days" value="1" min="1" required><br>
            Room Type:
            <select name="room_choice">
                <option value="1">Standard Non-AC - ₹3500/day</option>
                <option value="2">Standard AC - ₹4000/day</option>
                <option value="3">3-Bed Non-AC - ₹4500/day</option>
                <option value="4">3-Bed AC - ₹5000/day</option>
            </select><br><br>
            <button type="submit">Book Room</button>
        </form>
        <br>
        <a href="{{ url_for('home') }}">Back to Home</a>
    </div>
</body>
</html>
